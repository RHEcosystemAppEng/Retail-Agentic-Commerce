events {
    worker_connections 1024;
}

http {
    client_max_body_size 10M;

    upstream ui {
        server ui:3000;
    }

    upstream merchant {
        server merchant:8000;
    }

    upstream psp {
        server psp:8001;
    }

    upstream apps-sdk {
        server apps-sdk:2091;
    }

    server {
        listen 80;

        # Frontend UI (with WebSocket for Next.js HMR)
        location / {
            proxy_pass http://ui;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # UI API Routes (Next.js API routes - must come before /api/)
        # Webhook endpoint for post-purchase notifications
        location /api/webhooks/ {
            proxy_pass http://ui/api/webhooks/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Agent proxy endpoints (post-purchase agent)
        location /api/agents/ {
            proxy_pass http://ui/api/agents/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # API proxy routes - handled by Next.js (server-side auth)
        # MUST come before /api/ block to prevent merchant API from intercepting
        location /api/proxy/ {
            proxy_pass http://ui/api/proxy/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # Larger timeouts for proxy chains
            proxy_read_timeout 30s;
            proxy_connect_timeout 10s;
        }

        # Merchant API (default /api/ routes)
        location /api/ {
            proxy_pass http://merchant/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            proxy_read_timeout 300s;
        }

        # PSP Service
        location /psp/ {
            proxy_pass http://psp/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Apps SDK MCP Server (with SSE support)
        location /apps-sdk/ {
            proxy_pass http://apps-sdk/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 300s;
        }
    }
}
