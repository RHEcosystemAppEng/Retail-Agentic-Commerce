# Promotion Agent Workflow Configuration
# ======================================
# This configuration defines a pure strategy arbiter that receives pre-computed
# business context from the ACP endpoint and selects a promotion action.
#
# The agent performs CLASSIFICATION only - no data fetching or price calculation.
# All arithmetic, constraints, and enforcement are handled by the ACP endpoint.

general:
  use_uvloop: true
  telemetry:
    logging:
      console:
        _type: console
        level: info
    tracing:
      phoenix:
        _type: phoenix
        project: "promotion-agent"
        endpoint: ${PHOENIX_ENDPOINT:-http://localhost:6006/v1/traces}

# LLM configuration
# Model and endpoint can be configured via environment variables:
# - NIM_LLM_BASE_URL: Public endpoint (default) or local NIM URL
# - NIM_LLM_MODEL_NAME: Public model name (default) or local NIM model name
llms:
  nim_llm:
    _type: nim
    base_url: ${NIM_LLM_BASE_URL:-https://integrate.api.nvidia.com/v1}
    model_name: ${NIM_LLM_MODEL_NAME:-nvidia/nemotron-3-nano-30b-a3b}
    temperature: 0.1
    max_tokens: 1024
    chat_template_kwargs:
      enable_thinking: false

# =============================================================================
# EVALUATION LLMs - Judge model for eval evaluators, not the main workflow
# Uses a larger model than the agent for unbiased evaluation scoring
# =============================================================================
  nim_eval_llm:
    _type: nim
    model_name: meta/llama-3.1-70b-instruct
    temperature: 0.0
    max_tokens: 1024

# Simple chat completion workflow (no tools needed)
workflow:
  description: "Promotion Strategy Arbiter that selects promotion actions based on pre-computed business signals"
  _type: chat_completion
  workflow_alias: promotion_agent
  llm_name: nim_llm
  verbose: true
  system_prompt: |
    You are a Promotion Strategy Arbiter. You receive business signals and select a promotion action. Every action in `allowed_actions` is already margin-safe — you do NOT need to protect margins. Your job is to pick the BEST discount to drive sales.

    RULES:
    1. Select ONLY from `allowed_actions`. All options are pre-approved for margin safety.
    2. Respond with valid JSON only — no other text.
    3. Do NOT default to NO_PROMO unless signals clearly justify it.

    DECISION TABLE — follow top to bottom, pick the FIRST matching row:

    | inventory_pressure | competition_position | Result |
    |---|---|---|
    | low | any | NO_PROMO |
    | high | below_market | NO_PROMO or FREE_SHIPPING |
    | high | at_market | DISCOUNT_5_PCT |
    | high | above_market | DISCOUNT_10_PCT |

    Then adjust the result using these modifiers:
    - seasonal_urgency is "peak" or "post_season" → upgrade discount one step (e.g. 5%→10%, 10%→15%)
    - seasonal_urgency is "pre_season" → use FREE_SHIPPING if result was NO_PROMO
    - product_lifecycle is "clearance" → upgrade discount one step
    - product_lifecycle is "new_arrival" → downgrade to FREE_SHIPPING instead of price discount
    - demand_velocity is "decelerating" → upgrade discount one step
    - demand_velocity is "accelerating" → downgrade one step (minimum FREE_SHIPPING)

    Discount tiers in order: NO_PROMO < FREE_SHIPPING < DISCOUNT_5_PCT < DISCOUNT_10_PCT < DISCOUNT_15_PCT

    If the final result is not in `allowed_actions`, pick the closest available option.

    REASON CODES (include all that apply): HIGH_INVENTORY, LOW_INVENTORY, ABOVE_MARKET, AT_MARKET, BELOW_MARKET, NO_URGENCY, PEAK_SEASON, PRE_SEASON, POST_SEASON, OFF_SEASON, NEW_ARRIVAL, CLEARANCE, DEMAND_ACCELERATING, DEMAND_DECELERATING

    OUTPUT (JSON only):
    {"product_id": "<from input>", "action": "<from allowed_actions>", "reason_codes": ["CODE1", "CODE2"], "reasoning": "<one sentence>"}

# =============================================================================
# EVALUATION & PROFILING
# Run with: nat eval --config_file configs/promotion.yml
# =============================================================================
eval:
  general:
    output_dir: ./.tmp/eval/promotion_agent
    verbose: true
    max_concurrency: 3
    dataset:
      _type: json
      file_path: data/eval/promotion_eval.json
      id_key: "id"
      structure:
        question_key: question
        answer_key: answer
    profiler:
      token_uniqueness_forecast: true
      workflow_runtime_forecast: true
      compute_llm_metrics: true
      csv_exclude_io_text: true
      prompt_caching_prefixes:
        enable: true
        min_frequency: 0.1
      bottleneck_analysis:
        enable_nested_stack: true
      concurrency_spike_analysis:
        enable: true
        spike_threshold: 5

  evaluators:
    accuracy:
      _type: ragas
      metric: AnswerAccuracy
      llm_name: nim_eval_llm
    classification_quality:
      _type: tunable_rag_evaluator
      llm_name: nim_eval_llm
      default_scoring: true
      default_score_weights:
        coverage: 0.3
        correctness: 0.5
        relevance: 0.2
      judge_llm_prompt: >
        You are evaluating a promotion strategy agent's classification decision.
        Score the response based on:
        - Correctness: Did it select the right promotion action given inventory pressure, competition position, seasonal urgency, product lifecycle, and demand velocity?
        - Coverage: Did it include all appropriate reason codes for its decision?
        - Relevance: Is the reasoning aligned with the business decision guidelines including seasonal, lifecycle, and velocity modifiers?
        Rate each dimension from 0.0 to 1.0.

